version: "3.9"

services:
  postgres:
    image: postgres:16

    container_name: clublectura_postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: clublectura
      POSTGRES_PASSWORD: clublectura
      POSTGRES_DB: clublectura

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4

    container_name: clublectura_pgadmin

    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@clublectura.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

    depends_on:
      - postgres

volumes:
  postgres_data:
